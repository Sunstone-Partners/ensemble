metadata:
  name: ensemble:implement-trd-beads
  description: Implement TRD with beads project management — persistent bead hierarchy, dependency-aware execution via bd ready, and cross-session resumability
  version: 1.0.0
  lastUpdated: "2026-03-07"
  category: implementation
  output_path: ensemble/implement-trd-beads.md
  source: fortium
  model: sonnet
  argument_hint: "[trd-path] [--status] [--reset-task TRD-XXX] [max parallel N]"
  allowed_tools:
    - Read
    - Write
    - Edit
    - Bash
    - Grep
    - Glob
    - Task

mission:
  summary: |
    Parse a TRD and create a beads hierarchy (epic → stories → tasks) before
    any implementation begins. Drive execution order through bd ready rather
    than TRD re-parsing. Record all state transitions in beads so the implementation
    is resumable across sessions without access to local state files.

    This command wraps the implement-trd-enhanced execution model with a full
    beads project management layer. It transforms TRD-structured work into a
    persistent, queryable beads hierarchy and drives execution order through
    bd ready — enabling cross-session resumability and swarm-aware parallelism.

    Key behaviors:
    - Scaffold: epic → stories → tasks created in beads before first line of code
    - Idempotency: existing scaffolds detected via external-ref; partial scaffolds resumed safely
    - Execution: bd ready --parent <EPIC_ID> determines what to run next
    - Quality gates: phase completion triggers test delegation; results recorded as bead comments
    - No .trd-state/ files: beads are the single source of truth

workflow:
  phases:
    - name: Preflight
      order: 1
      steps:
        - order: 1
          title: Handle Special Arguments
          description: Process --status and --reset-task arguments for early exit paths
          actions:
            - "If $ARGUMENTS contains '--status': derive TRD_SLUG, query bd list --label trd-implementation --json, print bd swarm status for found epic, EXIT"
            - "If $ARGUMENTS contains '--reset-task': extract TASK_ID, find bead by external-ref trd:<TRD_SLUG>:task:<TASK_ID>, run bd update <BEAD_ID> --status open, EXIT"

        - order: 2
          title: Dolt and Beads Health Check
          description: Validate Dolt server and beads database are accessible
          actions:
            - "Run: gt dolt status 2>&1 — HALT if exit code != 0 or output contains 'latency > 5000'"
            - "Run: bd status 2>&1 — HALT if exit code != 0"
            - "On Dolt failure: print CLAUDE.md Dolt Operational Awareness diagnostics and escalation steps"

        - order: 3
          title: Git-Town and Working Directory Verification
          description: Verify git-town installed and working directory is clean
          actions:
            - "Run: bash packages/git/skills/git-town/scripts/validate-git-town.sh — handle exit codes 0 (ok), 1 (not installed), 2 (not configured), 3 (version mismatch), 4 (not git repo)"
            - "Run: git status --porcelain — HALT if output non-empty (dirty working directory)"

        - order: 4
          title: TRD Selection and Validation
          description: Locate and validate the target TRD file
          actions:
            - "Priority: $ARGUMENTS .md path → $ARGUMENTS name search in docs/TRD/ → single in-progress TRD in docs/TRD/ → prompt user"
            - "Validate: file exists, contains Master Task List section, contains at least one '- [ ] **TRD-' entry"
            - "Derive TRD_SLUG from filename: lowercase, replace non-alphanumeric with hyphens, strip leading/trailing hyphens"

        - order: 5
          title: Resume Detection
          description: Check for existing beads scaffold to enable cross-session resume
          actions:
            - "Run: bd list --label trd-implementation --json --limit 200"
            - "Search for item where external_ref starts with 'trd:<TRD_SLUG>' and type == 'epic'"
            - "If found: set ROOT_EPIC_ID, print bd swarm status, skip Scaffold phase, proceed to Execute"
            - "If not found: proceed to Feature Branch Creation then Scaffold"

        - order: 6
          title: Feature Branch Creation
          description: Create or switch to feature branch for TRD implementation
          actions:
            - "branch_name = 'feature/<TRD_SLUG>'"
            - "Run: git branch --list <branch_name>"
            - "If exists: git switch <branch_name>"
            - "If not exists: git town hack <branch_name> (fallback: git switch -c <branch_name>)"

        - order: 7
          title: Strategy Detection
          description: Determine implementation strategy from arguments, TRD content, or auto-detection
          actions:
            - "Priority: $ARGUMENTS strategy=X → TRD explicit → constitution → auto-detect → default (tdd)"
            - "Auto-detect: legacy/brownfield/untested → characterization; bug fix/regression → bug-fix; refactor/tech debt → refactor; prototype/spike/POC → test-after; default → tdd"

    - name: Scaffold
      order: 2
      steps:
        - order: 1
          title: TRD Parsing
          description: Parse TRD into structured phases and tasks
          actions:
            - "Pass 1: Extract TRD_TITLE from first H1 heading"
            - "Pass 2: Extract TRD_SUMMARY from first prose paragraph (max 500 chars)"
            - "Pass 3: Extract phases from '### Phase N' or '### Sprint N' headings; synthesize single phase if none found"
            - "Pass 4: Extract tasks matching '- [ ] **TRD-XXX**: Description' pattern; assign to phases by proximity"
            - "Pass 5: Validate at least one task found; warn on duplicate task IDs"

        - order: 2
          title: Idempotency Cache
          description: Cache existing beads to enable partial scaffold resume
          actions:
            - "Run: bd list --label trd-implementation --json --limit 500"
            - "Build EXISTING_BEADS map keyed by external_ref field"
            - "Use this cache for all 'already exists' checks during scaffold — do not re-query per bead"

        - order: 3
          title: Root Epic Creation
          description: Create the top-level epic bead for the TRD
          actions:
            - "Check EXISTING_BEADS for external_ref == 'trd:<TRD_SLUG>'"
            - "If found: ROOT_EPIC_ID = existing id; skip creation"
            - "If not found: ROOT_EPIC_ID = $(bd create --type epic --title 'Implement TRD: <TRD_TITLE>' --description '<TRD_SUMMARY>' --external-ref 'trd:<TRD_SLUG>' --labels 'trd-implementation' --priority 2 --silent)"
            - "HALT if exit code != 0 or ROOT_EPIC_ID empty"

        - order: 4
          title: Story Bead Creation
          description: Create one story bead per TRD phase under the root epic
          actions:
            - "For each phase i: check EXISTING_BEADS for external_ref == 'trd:<TRD_SLUG>:phase:<i>'"
            - "If found: STORY_BEAD_IDs[i] = existing id; skip creation"
            - "If not found: STORY_BEAD_IDs[i] = $(bd create --type feature --title 'Phase <i>: <phase.title>' --parent <ROOT_EPIC_ID> --external-ref 'trd:<TRD_SLUG>:phase:<i>' --labels 'trd-phase,trd-implementation' --priority 2 --silent)"
            - "HALT if any creation fails"

        - order: 5
          title: Task Bead Creation
          description: Create one task bead per TRD task under its phase story
          actions:
            - "For each task: check EXISTING_BEADS for external_ref == 'trd:<TRD_SLUG>:task:<task.id>'"
            - "If found: TASK_BEAD_IDs[i][j] = existing id; record in TRD_TO_BEAD_MAP; skip creation"
            - "If not found: create with --type task --title '<task.id>: <task.description>' --parent <STORY_BEAD_IDs[i]> --external-ref 'trd:<TRD_SLUG>:task:<task.id>' --labels 'trd-task,trd-implementation' [--estimate <minutes>] --silent"
            - "Record TRD_TO_BEAD_MAP[task.id] = bead_id for each task"

        - order: 6
          title: Dependency Encoding
          description: Wire explicit TRD dependencies and inter-phase sequential gates
          actions:
            - "For each task with depends_on: bd dep add <TASK_BEAD_ID> <TRD_TO_BEAD_MAP[dep_id]> (warn and skip if dep not in map)"
            - "For each phase i >= 2: bd dep add <first_task_of_phase_i> <last_task_of_phase_i-1> (inter-phase sequential gate)"

        - order: 7
          title: Swarm Creation and Summary
          description: Create swarm molecule and print scaffolding summary
          actions:
            - "SWARM_MOL_ID = $(bd swarm create <ROOT_EPIC_ID> --json | jq -r '.id')"
            - "Print scaffolding summary: epic ID, story count, task count, dep count, swarm ID"
            - "Print: bd swarm status <ROOT_EPIC_ID>"

    - name: Execute
      order: 3
      steps:
        - order: 1
          title: Execution Loop
          description: Poll bd ready and execute tasks until epic is complete
          actions:
            - "LOOP: Run bd ready --parent <ROOT_EPIC_ID> --type task --json --limit 10"
            - "If empty: check bd swarm status --json; if active==0 and ready==0 break to Completion; else PAUSE (possible dependency cycle)"
            - "If max_parallel==1 or single task ready: execute_single_task"
            - "Else: take up to max_parallel candidates; run file conflict detection; execute conflict-free group in parallel"
            - "After each task (or parallel group): print bd swarm status <ROOT_EPIC_ID>"

        - order: 2
          title: Task Claim and Specialist Selection
          description: Claim task in beads before delegating to specialist agent
          actions:
            - "Run: bd update <BEAD_ID> --claim — skip task if exit code != 0 (already claimed)"
            - "Extract TASK_ID from task.title prefix (TRD-XXX pattern)"
            - "Select specialist by keyword matching: backend/api/endpoint/database/server → @backend-developer; frontend/ui/component/react → @frontend-developer; test/spec/e2e/playwright → @test-runner or @playwright-tester; docs/readme → @documentation-specialist; infra/deploy/docker/k8s → @infrastructure-developer; default → @backend-developer"
            - "Check .claude/router-rules.json first; project-specific agents take priority over keyword defaults"
            - "Match skills via router-rules.json triggers/patterns; fallback: jest/pytest/rspec/exunit/xunit by language keywords"

        - order: 3
          title: Task Delegation
          description: Build prompt and delegate to selected specialist
          actions:
            - "Build prompt with: Task ID + bead ID, TRD file path, strategy, constitution targets, completed tasks this phase, acceptance criteria, inferred file paths, matched skills, strategy-specific instructions"
            - "Delegate: Task(agent_type=<specialist>, prompt=<prompt>)"
            - "On success: bd update <BEAD_ID> --status closed; update TRD checkbox - [ ] → - [x]; git commit"
            - "On failure: bd update <BEAD_ID> --status open; bd comments add <BEAD_ID> 'Implementation failed: <error>'; enter debug loop"

        - order: 4
          title: Debug Loop
          description: Attempt automated fix on task failure via deep-debugger (max 2 retries)
          actions:
            - "Delegate to @deep-debugger with error details, changed files, strategy, bead ID"
            - "If fix applied: re-run tests; if pass → bd update --status closed and continue; if fail → retry"
            - "After 2 retries: bd comments add <BEAD_ID> 'Debug loop exhausted after 2 retries. Manual intervention required.'; PAUSE for user decision"

        - order: 5
          title: Dolt Connectivity Monitoring
          description: Detect and handle Dolt failures mid-execution
          actions:
            - "After any bd command: if exit code != 0 AND prior bd commands in session succeeded → Dolt connectivity lost"
            - "Print DOLT CONNECTIVITY ALERT with diagnostic steps from CLAUDE.md"
            - "Print: gt escalate -s HIGH 'Dolt: connectivity lost during TRD implementation'"
            - "HALT (resume with /ensemble:implement-trd-beads <trd-path> after Dolt restored)"

    - name: Quality Gate
      order: 4
      steps:
        - order: 1
          title: Phase Completion Detection
          description: Detect when all tasks in a phase are closed
          actions:
            - "After each task completion: run bd list --parent <STORY_BEAD_ID> --type task --json"
            - "If all tasks have status == 'closed': trigger quality gate for this story/phase"

        - order: 2
          title: Test Execution
          description: Delegate test suite execution to test-runner
          actions:
            - "Delegate to @test-runner: run full test suite for files modified in this phase; report pass/fail, unit coverage %, integration coverage %, failures with file:line"
            - "Parse results: gate_passed = tests_pass AND unit_cov >= target AND int_cov >= target"
            - "Exception: strategy=characterization or flexible → gate_passed = true (informational only)"

        - order: 3
          title: Gate Result Recording
          description: Record quality gate outcome as bead comment and close story on pass
          actions:
            - "Run: bd comments add <STORY_BEAD_ID> 'Quality gate result: <PASS|FAIL> | unit: <X%> | integration: <Y%> | strategy: <strategy>'"
            - "If gate_passed: bd update <STORY_BEAD_ID> --status closed; git commit -m 'chore(phase <N>): checkpoint (tests pass; unit <X%>, int <Y%>)'"
            - "If NOT gate_passed AND blocking strategy (tdd/refactor/bug-fix): print gate failure details; PAUSE for user: fix/skip/abort"

    - name: Completion
      order: 5
      steps:
        - order: 1
          title: Epic Closure
          description: Close the root epic when all children are done
          actions:
            - "Verify: bd ready --parent ROOT_EPIC_ID --type task returns empty AND bd swarm status shows active==0 and ready==0"
            - "Run: bd epic close-eligible (closes ROOT_EPIC_ID if all children closed)"

        - order: 2
          title: TRD Checkbox Sync
          description: Update TRD file checkboxes to reflect bead closure state
          actions:
            - "For each task in TRD Master Task List: if TRD_TO_BEAD_MAP[task.id] exists and bead status == 'closed' → replace '- [ ] **<task.id>**' with '- [x] **<task.id>**'"
            - "git commit -m 'docs(TRD): sync checkboxes to bead closure state'"

        - order: 3
          title: Completion Report
          description: Print final summary and remind user about PR creation
          actions:
            - "Print completion report: TRD file, branch, strategy, epic ID, swarm ID, task counts, coverage summary"
            - "Print: bd swarm status <ROOT_EPIC_ID>"
            - "Remind user: git diff main...<branch>; gh pr create; after merge: mv <trd_file> docs/TRD/completed/"
            - "Do NOT auto-create PR — user must run gh pr create manually"

expectedOutput:
  format: Implemented Features with Quality Gates and Beads Tracking
  structure:
    - name: Beads Hierarchy
      description: Epic + story + task beads in Dolt with full dependency graph and swarm molecule
    - name: Feature Branch
      description: Git feature branch with implementation commits and phase checkpoint commits
    - name: Closed Beads
      description: All task and story beads closed with quality gate comments recorded
    - name: TRD Checkboxes
      description: TRD Master Task List updated with completed checkboxes synced to bead closure state
    - name: Completion Report
      description: Summary with epic ID, swarm ID, coverage metrics, and PR creation reminder
