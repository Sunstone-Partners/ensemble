metadata:
  name: ensemble:reqnroll-tdd
  description: Drive PRD acceptance criteria to green via an outside-in, red-gated Reqnroll + xUnit test-first loop
  version: 1.0.0
  lastUpdated: "2026-06-29"
  category: testing
  output_path: ensemble/reqnroll-tdd.md
  source: fortium
  model: high
  argument_hint: "[prd-path] [--sut <csproj>] [--out <dir>]"

constraints:
  - "Test-first is mandatory: a freshly authored scenario MUST be observed RED before any implementation. If it is green or empty immediately, reject it as vacuous and send it back."
  - The binding-specialist fills method BODIES only and never edits a generated [Given/When/Then(@"...")] attribute
  - Codegen (features, stubs, project) is deterministic via the reqnroll-cli helper -- never hand-author those artifacts
  - Work one scenario / PR slice at a time -- do NOT fill all bodies up front or implement everything before binding
  - Never delete a filled binding to make a suite pass; a step that cannot be proven stays Pending and is reported

mission:
  summary: |
    Take a PRD all the way to executable, passing acceptance tests using an
    outside-in, test-first loop: each acceptance criterion becomes a failing
    Reqnroll scenario first (red), and that red drives the implementation to green.
    The red gate is enforced by running the tests and asserting failure BEFORE any
    production code is written, so test-first is structural rather than a convention.
    Scaffolding and the step-matching layer are deterministic (reqnroll-cli); the
    step bodies are authored by the reqnroll-binding-specialist and the
    implementation by backend-developer using the test-driven-development skill.
    Iterate per scenario / PR slice so bindings and implementation interleave.

workflow:
  phases:
    - name: Scaffold
      order: 1
      steps:
        - order: 1
          title: Generate the Reqnroll project
          description: Deterministically scaffold features, step stubs, and the xUnit project
          actions:
            - "Resolve the PRD (argument or docs/PRD/) and the SUT project (--sut <csproj>)"
            - "Run: node ${CLAUDE_PLUGIN_ROOT}/lib/reqnroll-cli.js generate-bindings <prd-path> --out <dir> --sut <csproj> --json"
            - "Confirm the project builds with all scenarios Pending (red): node ${CLAUDE_PLUGIN_ROOT}/lib/reqnroll-cli.js run --project <projectDir> --json (expect green=false)"
            - Enumerate scenarios in PR-boundary order (or AC order) to drive the per-slice loop
    - name: Test-First Loop
      order: 2
      steps:
        - order: 1
          title: Author the failing acceptance test
          description: Fill this scenario's binding bodies against the contract you wish existed
          actions:
            - "Delegate: Task(subagent_type=reqnroll-binding-specialist, prompt='Fill the bindings for scenario <AC-id> in <Steps file>. Code against the intended SUT contract. Bodies only -- never edit attributes. Leave unmappable steps Pending and report them.')"
            - Capture its structured return (bound, stillPending)
        - order: 2
          title: RED gate (mandatory)
          description: Prove the scenario fails before writing any implementation
          actions:
            - "Run: node ${CLAUDE_PLUGIN_ROOT}/lib/reqnroll-cli.js run --project <projectDir> --filter @<AC-id> --json"
            - "REQUIRE green=false (failing assertion, Pending, or undefined step). If green=true immediately, REJECT: the assertion is vacuous or the behavior already exists -- send back to the binding-specialist."
        - order: 3
          title: Implement to green (inner TDD loop)
          description: Write production code to satisfy the now-failing scenario
          actions:
            - "Delegate: Task(subagent_type=backend-developer, prompt='Make acceptance scenario <AC-id> pass. Use the test-driven-development skill: unit-test-first, then implement. Do not modify the acceptance test or its step attributes.')"
        - order: 4
          title: GREEN gate
          description: Confirm the scenario passes and the proof is real
          actions:
            - "Run: node ${CLAUDE_PLUGIN_ROOT}/lib/reqnroll-cli.js run --project <projectDir> --filter @<AC-id> --json; REQUIRE green=true with zero Pending"
            - "Delegate: Task(subagent_type=code-reviewer, prompt='Confirm scenario <AC-id> Then steps assert the acceptance criterion meaningfully (not a no-op) and no [Given/When/Then] attribute was modified.')"
            - Advance to the next scenario / PR slice and repeat from step 1
    - name: Report
      order: 3
      steps:
        - order: 1
          title: Summarize outcomes
          description: Report green scenarios, still-pending steps, and drift status
          actions:
            - List scenarios now green, and any steps left Pending with the reported reason
            - "Run: node ${CLAUDE_PLUGIN_ROOT}/lib/reqnroll-cli.js check-binding-drift <prd-path> --out <dir> to confirm bindings still cover the PRD"
            - Recommend committing the test project alongside the implementation and wiring check-binding-drift into CI

expectedOutput:
  format: Passing Reqnroll acceptance tests + implementation
  structure:
    - name: Green acceptance scenarios
      description: Each driven from red to green test-first, one slice at a time
    - name: Outcome report
      description: Scenarios green, steps still Pending (with reasons), and binding-drift status
